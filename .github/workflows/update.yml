name: Update Progress

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Calculate day
        run: |
          DAY=$(date +%j)
          echo "DAY=$DAY" >> $GITHUB_ENV

      - name: Update README
        run: |
          sed -i "s|progress-bar.dev/[0-9]*/|progress-bar.dev/${DAY}/|g" README.md

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add README.md
          git commit -m "Auto update progress" || echo "No changes"
          git push
